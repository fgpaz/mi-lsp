<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mi-lsp Governance</title>
  <style>
    :root {
      color-scheme: light;
      --neo-bg: #eff0f4;
      --neo-bg-alt: #eceef3;
      --neo-surface: #eceef3;
      --neo-panel: #f4f6fb;
      --neo-ink: #0f172a;
      --neo-muted: #64748b;
      --neo-line: #d0d4dd;
      --neo-accent: #475569;
      --neo-accent-soft: #eceef3;
      --neo-warning: #c07020;
      --neo-warning-soft: #f4e0c8;
      --neo-danger: #a0342a;
      --neo-danger-soft: #f2d6d2;
      --neo-shadow-light: rgba(255,255,255,0.90);
      --neo-shadow-dark: rgba(175,187,207,0.22);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-pill: 999px;
      --space-1: 6px;
      --space-2: 10px;
      --space-3: 14px;
      --space-4: 18px;
      --space-5: 24px;
      --space-6: 32px;
      --font-sans: "Aptos", "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
      --font-mono: "Cascadia Code", "Aptos Mono", "SFMono-Regular", Consolas, monospace;
      --ease-soft: cubic-bezier(.2,.8,.2,1);
      --motion-fast: 160ms;
      --focus-ring: 0 0 0 3px rgba(71,85,105,0.20);
    }

    * { box-sizing: border-box; }
    html { background: linear-gradient(145deg, var(--neo-bg), var(--neo-bg-alt)); }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--neo-ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 32%),
        radial-gradient(circle at bottom right, rgba(175,187,207,0.06), transparent 28%),
        linear-gradient(145deg, var(--neo-bg), var(--neo-bg-alt));
    }

    button, input, select { font: inherit; color: inherit; }
    button, .interactive { min-height: 36px; }

    .skip-link {
      position: absolute;
      left: 16px;
      top: -48px;
      z-index: 1000;
      background: var(--neo-accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      text-decoration: none;
      transition: top var(--motion-fast) var(--ease-soft);
    }
    .skip-link:focus { top: 16px; }

    .shell { max-width: 1480px; margin: 0 auto; padding: 8px 24px; }
    .panel {
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(236,238,243,0.96));
      box-shadow: 8px 8px 18px var(--neo-shadow-dark), -6px -6px 14px var(--neo-shadow-light);
    }
    .neo-inward {
      background: linear-gradient(180deg, rgba(226,229,238,0.98), rgba(240,242,247,0.84));
      box-shadow: inset 4px 4px 10px rgba(175,187,207,0.22), inset -4px -4px 10px rgba(255,255,255,0.90);
    }
    .panel-side {
      background: color-mix(in srgb, var(--neo-surface) 97%, var(--neo-ink) 3%);
    }
    .panel-main { contain: layout style; }
    .panel-side { contain: layout style; }

    .topbar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: 10px var(--space-5);
      flex-wrap: wrap;
    }
    .eyebrow {
      margin: 0 0 var(--space-2);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--neo-accent);
      font-weight: 700;
    }
    .headline {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    .lede, .muted { color: var(--neo-muted); }
    .lede { display: none; }

    .meta-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1) var(--space-4);
      align-items: center;
      margin-left: auto;
    }
    .meta-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 5px;
      padding: 0;
      background: none;
      box-shadow: none;
      border-radius: 0;
    }
    .meta-label, .metric-label, .summary-label, .detail-term, .table th, .field span {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--neo-muted);
    }
    .meta-label { font-size: 11px; }
    .meta-value { font-size: 13px; }
    .meta-value, .metric-value, .mono, .table td.is-num, .summary-value { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    .kpi-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1) var(--space-3);
      padding: 8px var(--space-5);
      background: var(--neo-surface);
      border-bottom: 1px solid var(--neo-line);
      border-radius: var(--radius-lg);
      margin-top: 8px;
      box-shadow: none;
      align-items: center;
    }
    .kpi-card {
      display: flex;
      align-items: baseline;
      gap: 6px;
      background: transparent;
      box-shadow: none;
      border: none;
      padding: 2px 0;
      min-width: 0;
      flex-direction: row;
    }
    .kpi-card + .kpi-card::before {
      content: "";
      display: inline-block;
      width: 1px;
      height: 16px;
      background: var(--neo-line);
      margin-right: var(--space-3);
      align-self: center;
    }
    .kpi-alert { background: transparent !important; border: none !important; }
    .kpi-value--alert { color: var(--neo-warning); }
    .metric-value { font-size: 20px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
    .metric-subtle { display: none; }

    .toolbar { margin-top: 8px; padding: 10px var(--space-4); }
    .toolbar-grid { display: flex; flex-direction: column; gap: 8px; }
    .toolbar-filters {
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) repeat(2, minmax(160px, .6fr)) minmax(200px, 1fr);
      gap: var(--space-3);
      align-items: end;
    }
    .toolbar-grid > .action-stack { justify-content: flex-end; }
    .field { display: grid; gap: 8px; min-width: 0; }
    .field input, .field select, .action-button, .workspace-tab, .segmented button, .drawer-button {
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(236,238,243,0.96));
      box-shadow: 8px 8px 16px rgba(175,187,207,0.18), -6px -6px 12px rgba(255,255,255,0.90);
      transition: transform var(--motion-fast) var(--ease-soft), box-shadow var(--motion-fast) var(--ease-soft), border-color var(--motion-fast) var(--ease-soft), background var(--motion-fast) var(--ease-soft);
    }
    .field input, .field select { width: 100%; padding: 0 14px; outline: none; }
    .field input:focus-visible, .field select:focus-visible, .action-button:focus-visible, .workspace-tab:focus-visible, .segmented button:focus-visible, .row-button:focus-visible, .drawer-button:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring), 8px 8px 16px rgba(175,187,207,0.18), -6px -6px 12px rgba(255,255,255,0.90);
    }
    .action-stack { display: flex; justify-content: flex-end; gap: var(--space-2); flex-wrap: wrap; }
    .action-button, .workspace-tab, .segmented button, .drawer-button, .row-button {
      cursor: pointer;
      padding: 0 16px;
      font-weight: 700;
      color: var(--neo-ink);
    }
    .action-button:hover, .workspace-tab:hover, .segmented button:hover, .drawer-button:hover, .row-button:hover {
      transform: translateY(-1px);
      box-shadow: 10px 10px 18px rgba(175,187,207,0.24), -7px -7px 14px rgba(255,255,255,0.90);
    }
    .action-button:active, .workspace-tab:active, .segmented button:active, .drawer-button:active, .row-button:active {
      transform: translateY(0);
      box-shadow: inset 4px 4px 10px rgba(175,187,207,0.22), inset -4px -4px 10px rgba(255,255,255,0.90);
    }
    .segmented {
      display: inline-flex;
      gap: var(--space-2);
      padding: 6px;
      border-radius: var(--radius-pill);
      background: linear-gradient(180deg, rgba(226,229,238,0.95), rgba(240,242,247,0.85));
      box-shadow: inset 3px 3px 8px rgba(175,187,207,0.20), inset -3px -3px 8px rgba(255,255,255,0.90);
    }
    .segmented button[aria-pressed="true"], .workspace-tab[aria-selected="true"], .action-button.is-active {
      background: linear-gradient(180deg, rgba(236,238,243,0.98), rgba(248,250,252,0.96));
      border-color: rgba(71,85,105,0.22);
      box-shadow: inset 4px 4px 10px rgba(175,187,207,0.22), inset -4px -4px 10px rgba(255,255,255,0.90);
      color: var(--neo-ink);
    }
    .action-button.is-primary, .drawer-button.is-primary {
      color: #fff;
      background: linear-gradient(180deg, #334155, #1e293b);
      border-color: rgba(30,41,59,0.4);
      box-shadow: 10px 10px 18px rgba(30,41,59,0.18), -6px -6px 14px rgba(255,255,255,0.68);
    }

    .workspace-nav { margin-top: 8px; padding: var(--space-2) var(--space-3); }
    .workspace-tabs { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .workspace-tab { display: inline-flex; align-items: center; gap: 8px; padding: 4px 14px 4px 4px; font-size: 13px; border-radius: var(--radius-pill); }
    .workspace-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      min-height: 28px;
      padding: 0 9px;
      border-radius: var(--radius-pill);
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(24,33,43,0.08);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .92fr) minmax(300px, .82fr);
      gap: var(--space-3);
      margin-top: 8px;
      align-items: start;
      contain: layout;
    }
    .panel-main, .panel-side, .drawer { padding: 14px var(--space-4); min-height: 320px; }
    .panel-head { display: flex; justify-content: space-between; gap: var(--space-3); align-items: start; margin-bottom: 10px; }
    .panel-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
      border-left: 3px solid var(--neo-accent);
      padding-left: 10px;
      color: var(--neo-ink);
    }
    .panel-copy { margin: 4px 0 0; color: var(--neo-muted); line-height: 1.4; font-size: 13px; }
    .badge-row, .drawer-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-ok { background: #dcfce7; color: #16a34a; }
    .badge-warn { background: var(--neo-warning-soft); color: var(--neo-warning); border: 1px solid var(--neo-warning); }
    .badge-danger { background: var(--neo-danger-soft); color: var(--neo-danger); }
    .badge-neutral { background: rgba(24,33,43,0.08); color: var(--neo-ink); }

    .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-2); margin-top: var(--space-2); }
    .summary-item {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(255,255,255,0.68), rgba(236,238,243,0.94));
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.68), inset -1px -1px 0 rgba(208,212,221,0.42);
    }
    .summary-value { margin-top: 5px; font-size: 18px; font-weight: 800; }

    .table-shell { overflow: hidden; border-radius: var(--radius-md); border: 1px solid rgba(208,212,221,0.74); background: rgba(248,250,252,0.72); }
    .table-wrap { overflow: auto; max-width: 100%; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid rgba(208,212,221,0.66); vertical-align: top; }
    .table th { position: sticky; top: 0; z-index: 1; background: rgba(236,238,243,0.98); font-size: 11px; }
    .table--flat th { position: static !important; display: table-cell !important; background: rgba(236,238,243,0.98); }
    .table tr:last-child td { border-bottom: none; }
    .table tbody tr:hover { background: rgba(175,187,207,0.08); }
    .metrics-side-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-top: var(--space-4); }
    .metrics-section-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--neo-accent); margin: 0 0 8px; }
    .metrics-item { display: flex; align-items: baseline; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(208,212,221,0.36); font-size: 13px; }
    .metrics-item:last-child { border-bottom: none; }
    .metrics-item-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metrics-item-value { color: var(--neo-muted); font-size: 12px; white-space: nowrap; }
    .row-button { width: 100%; min-height: 0; padding: 0; border: none; background: transparent; box-shadow: none; text-align: left; border-radius: 0; font-weight: inherit; }
    .row-button:hover, .row-button:active { box-shadow: none; transform: none; }
    .row-main { display: block; font-weight: 700; line-height: 1.45; }
    .row-sub { display: block; margin-top: 4px; color: var(--neo-muted); line-height: 1.45; }

    .drawer {
      position: sticky;
      top: 12px;
      contain: layout style;
      background: color-mix(in srgb, var(--neo-surface) 95%, var(--neo-ink) 5%);
    }
    .drawer-body, .detail-list { display: grid; gap: 8px; }
    .detail-row {
      padding: 7px 12px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(255,255,255,0.64), rgba(236,238,243,0.90));
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.64), inset -1px -1px 0 rgba(208,212,221,0.42);
    }
    .detail-value { display: block; line-height: 1.5; word-break: break-word; }

    .empty-state, .log-state { display: grid; place-items: center; min-height: 140px; padding: var(--space-4); text-align: center; color: var(--neo-muted); }
    .empty-state strong, .log-state strong { display: block; color: var(--neo-ink); font-size: 20px; margin-bottom: 8px; }
    .log-shell {
      padding: 14px;
      border-radius: var(--radius-md);
      background: #131a1f;
      color: #d8e2ea;
      border: 1px solid color-mix(in srgb, var(--neo-accent) 30%, var(--neo-line) 70%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
    }
    .log-lines { margin: 0; max-height: 340px; overflow-y: auto; overflow-x: hidden; font-family: var(--font-mono); font-size: 12px; line-height: 1.55; contain: content; }
    .log-lines > div { display: flex; align-items: baseline; min-width: 0; }
    .log-text { flex: 1; min-width: 0; word-break: break-word; overflow-wrap: break-word; white-space: pre-wrap; }
    .log-line-number { flex-shrink: 0; display: inline-block; min-width: 54px; margin-right: 12px; color: #7fa0af; text-align: right; user-select: none; }

    .statusbar { display: flex; justify-content: space-between; gap: var(--space-3); align-items: center; margin-top: 8px; padding: 0 4px; color: var(--neo-muted); font-size: 13px; }
    .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 0 12px; min-height: 36px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.40); box-shadow: inset 1px 1px 0 rgba(255,255,255,0.50), inset -1px -1px 0 rgba(208,212,221,0.42); }
    .pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--neo-accent); box-shadow: 0 0 0 0 rgba(71,85,105,0.40); animation: pulse 2s infinite; }
    .toast {
      position: fixed; right: 24px; bottom: 24px; max-width: 360px; padding: 14px 18px; border-radius: var(--radius-md); color: #fff;
      background: linear-gradient(180deg, #334155, #1e293b); box-shadow: 12px 12px 24px rgba(15,23,42,0.18);
      opacity: 0; transform: translateY(14px); pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-soft), transform var(--motion-fast) var(--ease-soft);
    }
    .toast.is-visible { opacity: 1; transform: translateY(0); }
    .toast.is-warning { background: linear-gradient(180deg, #c27420, #b06318); }
    .toast.is-danger { background: linear-gradient(180deg, #b84438, #a0342a); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(71,85,105,0.30); } 70% { box-shadow: 0 0 0 10px rgba(71,85,105,0); } 100% { box-shadow: 0 0 0 0 rgba(71,85,105,0); } }
    @media (max-width: 1260px) { .content-grid { grid-template-columns: minmax(0, 1fr) minmax(0, .95fr); } .drawer { grid-column: 1 / -1; position: static; min-height: 0; } }
    @media (max-width: 980px) { .topbar, .content-grid, .toolbar-filters, .kpi-grid, .summary-grid, .meta-grid { grid-template-columns: 1fr; } .action-stack { justify-content: stretch; } .action-stack > * { flex: 1 1 180px; } .statusbar { flex-direction: column; align-items: flex-start; } }
    @media (max-width: 768px) { .log-lines { font-size: 14px; } .table th, .table td { font-size: 14px; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="shell">
    <header id="topbar" class="topbar panel" role="banner">
      <section style="flex-shrink:0">
        <p class="eyebrow" style="margin:0 0 2px">Local Governance</p>
        <h1 class="headline">mi-lsp operational console</h1>
      </section>
      <section id="daemon-meta" class="meta-grid" aria-live="polite"></section>
    </header>

    <section id="kpi-grid" class="kpi-grid" aria-label="Key metrics"></section>

    <section class="toolbar panel" aria-label="Filters and safe actions">
      <div class="toolbar-grid">
        <div class="toolbar-filters">
          <label class="field"><span>Search</span><input id="search-input" class="interactive" type="search" placeholder="Filter workspaces, runtimes, operations, clients" autocomplete="off" /></label>
          <label class="field"><span>Backend</span><select id="backend-filter" class="interactive"></select></label>
          <label class="field"><span>Client</span><select id="client-filter" class="interactive"></select></label>
          <label class="field"><span>Window</span><select id="window-filter" class="interactive"></select></label>
          <div><div class="field"><span>Panel</span></div><div id="panel-switcher" class="segmented" role="tablist" aria-label="Primary panel"></div></div>
        </div>
        <div class="action-stack" aria-label="Safe actions">
          <button type="button" class="action-button interactive" data-action="refresh">Refresh</button>
          <button type="button" class="action-button interactive" data-action="warm-workspace">Warm workspace</button>
          <button type="button" class="action-button interactive" data-action="open-logs">Open logs</button>
          <button type="button" class="action-button is-primary interactive" data-action="copy-command">Copy CLI</button>
        </div>
      </div>
    </section>

    <nav class="workspace-nav panel" aria-label="Workspace tabs"><div id="workspace-tabs" class="workspace-tabs"></div></nav>
    <main id="main-content" class="content-grid">
      <section id="primary-panel" class="panel panel-main" aria-live="polite"></section>
      <section id="secondary-panel" class="panel panel-side" aria-live="polite"></section>
      <aside id="drawer-panel" class="panel drawer" aria-live="polite"></aside>
    </main>
    <footer class="statusbar"><div id="last-updated" class="status-pill mono">Waiting for first refresh…</div><div id="live-status" class="status-pill"><span class="pulse" aria-hidden="true"></span><span>Auto-refresh every 30s</span></div></footer>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script>
    (function () {
      var REFRESH_MS = 30000;
      var state = { dashboard: null, detail: null, logs: null, metrics: null, drawer: null, selectedWorkspace: '', panel: 'overview', window: 'recent', filters: { search: '', backend: 'all', client: 'all' }, lastUpdated: null, toastTimer: null, refreshTimer: null };
      function parseRoute() {
        var params = new URLSearchParams(window.location.search);
        state.selectedWorkspace = params.get('workspace') || '';
        state.panel = params.get('panel') || 'overview';
        state.window = params.get('window') || 'recent';
        state.filters.backend = params.get('backend') || 'all';
        state.filters.client = params.get('client') || 'all';
        state.filters.search = params.get('q') || state.filters.search || '';
      }
      function updateRoute(changes, replace) {
        var params = new URLSearchParams(window.location.search);
        Object.keys(changes).forEach(function (key) {
          var value = changes[key];
          if (value === '' || value === null || typeof value === 'undefined') { params.delete(key); return; }
          params.set(key, value);
        });
        var next = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        window.history[replace ? 'replaceState' : 'pushState']({}, '', next);
        parseRoute();
      }
      function escapeHtml(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
      function formatDate(value) {
        if (!value || String(value).indexOf('0001-') === 0) { return '-'; }
        var date = new Date(value);
        if (isNaN(date.getTime())) { return '-'; }
        return new Intl.DateTimeFormat(undefined, { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(date);

      function formatBytes(bytes) {

          '<div class="summary-grid">' +
          renderSummaryItem('Total requests', String(m.total || 0)) +
          renderSummaryItem('Avg latency', formatDurationMs(Math.round(avgLatency))) +
          renderSummaryItem('Error rate', ((m.error_rate || 0).toFixed(1)) + '%') +
          renderSummaryItem('Truncation rate', ((m.trunc_rate || 0).toFixed(1)) + '%') +
          renderSummaryItem('Operations tracked', String((m.operations || []).length)) +
          renderSummaryItem('Workspaces', String((m.workspaces || []).length)) +
          '</div>';
      }
      function renderWorkspaceSnapshot() {
        var detail = selectedWorkspaceDetail();
        var summary = detail && detail.summary ? detail.summary : null;
        var workspaceCount = currentWorkspaces().length;
        return '<div class="panel-head"><div><h2 class="panel-title">Workspace snapshot</h2><p class="panel-copy">Fast summary of the currently selected workspace and the global daemon pressure envelope.</p></div><div class="badge-row">' + badge(workspaceCount + ' tracked workspaces', 'neutral') + '</div></div>' + '<div class="summary-grid">' + renderSummaryItem('Selected workspace', summary ? summary.workspace : state.selectedWorkspace || '-') + renderSummaryItem('Kind', workspaceKind(detail)) + renderSummaryItem('Repos', String(workspaceRepoCount(detail) || 1)) + renderSummaryItem('Entrypoints', String(workspaceEntrypointCount(detail) || 1)) + renderSummaryItem('Backends', summary && summary.backends && summary.backends.length ? summary.backends.join(', ') : 'none') + renderSummaryItem('Warnings', summary ? String(summary.warning_count || 0) : '0') + '</div><div style="margin-top:10px">' + renderQuickOps() + '</div>';
      }
      function renderSecondaryPanel() {
        if (state.panel === 'metrics') { return renderMetricsSecondary(); }
        if (state.panel === 'activity') { return renderWorkspaceSnapshot(); }
        if (state.panel === 'logs') { return renderQuickOps(); }
        var preview = filteredAccesses(8);
        if (!preview.length) { return renderEmptyState('Activity preview', 'Recent daemon accesses will appear here as soon as clients begin using shared semantic runtimes.'); }
        return '<div class="panel-head"><div><h2 class="panel-title">Activity preview</h2><p class="panel-copy">A quick slice of recent events so you can spot cold starts and warning patterns while staying in the workspace view.</p></div><div class="badge-row">' + badge(currentWindowLabel(), 'neutral') + badge(preview.length + ' events', 'neutral') + '</div></div>' + renderAccessTable(preview);
      }
      function renderRuntimeDrawer(item) {
        return '<div class="panel-head"><div><h2 class="panel-title">Runtime detail</h2><p class="panel-copy">A live backend instance currently managed by the daemon for one workspace and semantic entrypoint.</p></div><div class="badge-row">' + badge((item.backend_type || 'backend') + ' runtime', 'ok') + '</div></div><div class="drawer-body"><div class="detail-list">' + renderDetailRow('Workspace', item.workspace || '-') + renderDetailRow('Workspace root', item.workspace_root || '-') + renderDetailRow('Repo', runtimeRepoLabel(item)) + renderDetailRow('Repo root', item.repo_root || '-') + renderDetailRow('Entrypoint', item.entrypoint_id || '-') + renderDetailRow('Entrypoint path', item.entrypoint_path || '-') + renderDetailRow('Entrypoint type', item.entrypoint_type || '-') + renderDetailRow('Backend', item.backend_type || '-') + renderDetailRow('PID', item.pid || '-') + renderDetailRow('Memory', formatBytes(item.memory_bytes)) + renderDetailRow('Started', formatDate(item.started_at)) + renderDetailRow('Last used', formatDate(item.last_used_at)) + renderDetailRow('Runtime key', item.runtime_key || '-') + '</div><div class="drawer-actions"><button type="button" class="drawer-button is-primary interactive" data-action="copy-command">Copy CLI</button><button type="button" class="drawer-button interactive" data-action="close-drawer">Close</button></div></div>';
      }
      function renderAccessDrawer(item) {
        var warnings = item.warnings && item.warnings.length ? item.warnings.join('\n') : 'none';
        return '<div class="panel-head"><div><h2 class="panel-title">Access detail</h2><p class="panel-copy">One daemon request observed from a local client or agent session.</p></div><div class="badge-row">' + badge(item.success ? 'success' : 'failure', item.success ? 'ok' : 'danger') + '</div></div><div class="drawer-body"><div class="detail-list">' + renderDetailRow('When', formatDate(item.occurred_at)) + renderDetailRow('Workspace', item.workspace || '-') + renderDetailRow('Workspace root', item.workspace_root || '-') + renderDetailRow('Workspace input', item.workspace_input || '-') + renderDetailRow('Repo', item.repo || '-') + renderDetailRow('Entrypoint', item.entrypoint_id || '-') + renderDetailRow('Operation', item.operation || '-') + renderDetailRow('Backend', item.backend || '-') + renderDetailRow('Error kind', item.error_kind || '-') + renderDetailRow('Error code', item.error_code || '-') + renderDetailRow('Client', item.client_name || 'manual-cli') + renderDetailRow('Session', item.session_id || '-') + renderDetailRow('Latency', formatDurationMs(item.latency_ms)) + renderDetailRow('Result count', String(item.result_count || 0)) + renderDetailRow('Truncated', item.truncated ? 'yes' : 'no') + renderDetailRow('Warnings', warnings) + renderDetailRow('Error', item.error || '-') + '</div><div class="drawer-actions"><button type="button" class="drawer-button is-primary interactive" data-action="copy-command">Copy CLI</button><button type="button" class="drawer-button interactive" data-action="close-drawer">Close</button></div></div>';
      }
      function renderDrawer() {
        if (!state.drawer) {
          var showOps = state.panel === 'overview';
          return '<div class="panel-head"><div><h2 class="panel-title">Context drawer</h2><p class="panel-copy">Click any runtime or activity row to inspect details without leaving the dashboard. This keeps the hot path compact while deeper context stays one click away.</p></div></div>' + (showOps ? renderQuickOps() : '');
        }
        return state.drawer.type === 'runtime' ? renderRuntimeDrawer(state.drawer.item) : renderAccessDrawer(state.drawer.item);
      }
      function applyRenderedState(skipTopMatter) {
        if (!skipTopMatter) {
          setHtml('daemon-meta', renderMeta());
          setHtml('kpi-grid', renderKpis());
          setHtml('workspace-tabs', renderTabs());
          setHtml('last-updated', '<span class="mono">Last refresh: ' + escapeHtml(formatDate(state.lastUpdated)) + '</span>');
        }
        renderToolbar();
        setHtml('primary-panel', state.panel === 'activity' ? renderActivityPanel() : (state.panel === 'logs' ? renderLogsPanel() : (state.panel === 'metrics' ? renderMetricsPanel() : renderOverviewPanel())));
        setHtml('secondary-panel', renderSecondaryPanel());
        setHtml('drawer-panel', renderDrawer());
      }
      async function loadData(silent) {
        try {
          parseRoute();
          state.dashboard = await loadJSON('/api/status?limit=160&window=' + encodeURIComponent(state.window));
          var workspaces = currentWorkspaces();
          if (!state.selectedWorkspace && workspaces.length) { updateRoute({ workspace: workspaces[0].workspace, panel: state.panel, window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, true); }
          state.detail = state.selectedWorkspace ? await loadJSON('/api/workspaces/' + encodeURIComponent(state.selectedWorkspace) + '?window=' + encodeURIComponent(state.window)) : null;
          state.logs = state.panel === 'logs' ? await loadJSON('/api/logs?tail=120') : null;
          state.metrics = state.panel === 'metrics' ? await loadJSON('/api/metrics?window=' + encodeURIComponent(state.window)) : null;
          state.lastUpdated = new Date().toISOString();
          applyRenderedState();
          if (!silent) { showToast('Dashboard refreshed', 'ok'); }
        } catch (error) {
          showToast(error.message || 'Refresh failed', 'danger');
        }
      }
      function findRuntime(runtimeKey) { var items = filteredRuntimes(); for (var i = 0; i < items.length; i += 1) { if ((items[i].runtime_key || '') === runtimeKey) { return items[i]; } } return null; }
      function findAccess(accessID) { var items = filteredAccesses(); for (var i = 0; i < items.length; i += 1) { if (String(items[i].id || '') === String(accessID || '')) { return items[i]; } } return null; }
      document.addEventListener('click', function (event) {
        var actionNode = event.target.closest('[data-action]');
        if (!actionNode) { return; }
        var action = actionNode.getAttribute('data-action');
        if (action === 'refresh') { loadData(true); return; }
        if (action === 'set-workspace') {
          updateRoute({ workspace: actionNode.getAttribute('data-workspace') || '', panel: state.panel, window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, false);
          state.drawer = null; loadData(true); return;
        }
        if (action === 'set-panel') {
          updateRoute({ workspace: state.selectedWorkspace || null, panel: actionNode.getAttribute('data-panel') || 'overview', window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, false);
          if (state.panel === 'logs' || state.panel === 'metrics') { loadData(true); } else { applyRenderedState(); }
          return;
        }
        if (action === 'open-logs') { updateRoute({ workspace: state.selectedWorkspace || null, panel: 'logs', window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, false); loadData(true); return; }
        if (action === 'warm-workspace') { warmWorkspace(); return; }
        if (action === 'copy-command') { var cmd = actionNode.getAttribute('data-command'); copyText(cmd !== null ? cmd : currentCommand()); return; }
        if (action === 'open-runtime') {
          var runtime = findRuntime(actionNode.getAttribute('data-runtime-key'));
          if (runtime) { state.drawer = { type: 'runtime', item: runtime }; setHtml('drawer-panel', renderDrawer()); }
          return;
        }
        if (action === 'open-access') {
          var access = findAccess(actionNode.getAttribute('data-access-id'));
          if (access) { state.drawer = { type: 'access', item: access }; setHtml('drawer-panel', renderDrawer()); }
          return;
        }
        if (action === 'close-drawer') { state.drawer = null; setHtml('drawer-panel', renderDrawer()); }
      });
      var searchDebounce;
      document.addEventListener('input', function (event) {
        if (event.target && event.target.id === 'search-input') {
          state.filters.search = event.target.value || '';
          updateRoute({ workspace: state.selectedWorkspace || null, panel: state.panel, window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, true);
          clearTimeout(searchDebounce);
          searchDebounce = setTimeout(function () { applyRenderedState(true); }, 300);
        }
      });
      document.addEventListener('change', function (event) {
        if (event.target && event.target.id === 'backend-filter') {
          state.filters.backend = event.target.value || 'all';
          updateRoute({ workspace: state.selectedWorkspace || null, panel: state.panel, window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, true);
          applyRenderedState(true);
          return;
        }
        if (event.target && event.target.id === 'client-filter') {
          state.filters.client = event.target.value || 'all';
          updateRoute({ workspace: state.selectedWorkspace || null, panel: state.panel, window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, true);
          applyRenderedState(true);
          return;
        }
        if (event.target && event.target.id === 'window-filter') {
          state.window = event.target.value || 'recent';
          updateRoute({ workspace: state.selectedWorkspace || null, panel: state.panel, window: state.window, backend: state.filters.backend, client: state.filters.client, q: state.filters.search || null }, true);
          state.drawer = null;
          loadData(true);
        }
      });
      window.addEventListener('popstate', function () { state.drawer = null; loadData(true); });
      function scheduleRefresh() {
        if (state.refreshTimer) { window.clearInterval(state.refreshTimer); }
        state.refreshTimer = window.setInterval(function () { loadData(true); }, REFRESH_MS);
      }
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          if (state.refreshTimer) { window.clearInterval(state.refreshTimer); state.refreshTimer = null; }
        } else {
          scheduleRefresh();
        }
      });
      parseRoute();
      loadData(true);
      scheduleRefresh();
      window.addEventListener('beforeunload', function () { if (state.refreshTimer) { window.clearInterval(state.refreshTimer); } });
    })();
  </script>
</body>
</html>
