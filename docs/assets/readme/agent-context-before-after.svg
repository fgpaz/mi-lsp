<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">mi-lsp agent context savings overview</title>
  <desc id="desc">A before and after visual showing how mi-lsp turns broad repo discovery into compact agent commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#16213b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .card { fill: #101827; stroke: #2b3b55; stroke-width: 1.4; }
      .card-soft { fill: #0b1220; stroke: #26344a; stroke-width: 1.2; }
      .accent { fill: url(#accent); }
      .muted { fill: #9ca3af; }
      .text { fill: #e5eefb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #cbd5e1; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .small { font-size: 22px; }
      .body { font-size: 27px; }
      .label { font-size: 28px; font-weight: 700; }
      .title { font-size: 46px; font-weight: 800; letter-spacing: 0; }
      .big { font-size: 58px; font-weight: 850; letter-spacing: 0; }
      .metric { font-size: 38px; font-weight: 800; letter-spacing: 0; }
      .pill { fill: #123638; stroke: #1e736c; stroke-width: 1; }
      .warn { fill: #341b1f; stroke: #7f2c39; stroke-width: 1; }
      .line { stroke: #334155; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620" rx="34"/>
  <text x="60" y="74" class="text title">Stop spending agent context just to find context</text>
  <text x="60" y="116" class="muted small">mi-lsp gives Codex and Claude-style agents a local repo map before they start opening whole files.</text>

  <rect x="60" y="158" width="496" height="320" rx="24" class="card"/>
  <rect x="644" y="158" width="496" height="320" rx="24" class="card"/>
  <line x1="590" y1="206" x2="590" y2="430" class="line"/>
  <polygon points="590,304 622,320 590,336" class="accent"/>

  <rect x="92" y="190" width="172" height="46" rx="23" class="warn"/>
  <text x="112" y="222" class="text small" font-weight="700">Without mi-lsp</text>
  <text x="92" y="276" class="text label">Discovery eats the session</text>
  <text x="92" y="323" class="mono small">grep -> open files -> summarize</text>
  <text x="92" y="360" class="mono small">retry -> read more -> ask again</text>
  <text x="92" y="408" class="muted small">The agent spends tokens learning where the work is.</text>

  <rect x="676" y="190" width="148" height="46" rx="23" class="pill"/>
  <text x="696" y="222" class="text small" font-weight="700">With mi-lsp</text>
  <text x="676" y="276" class="text label">Context arrives already shaped</text>
  <text x="676" y="323" class="mono small">nav ask -> repo map</text>
  <text x="676" y="360" class="mono small">nav pack -> docs + exact slices</text>
  <text x="676" y="408" class="muted small">The agent spends context on the change itself.</text>

  <rect x="60" y="510" width="330" height="70" rx="20" class="card-soft"/>
  <text x="88" y="552" class="text metric">20-40%</text>
  <text x="232" y="542" class="muted small">fewer tokens</text>
  <text x="232" y="568" class="muted small">with TOON on large arrays</text>

  <rect x="435" y="510" width="330" height="70" rx="20" class="card-soft"/>
  <text x="463" y="552" class="text metric">1 call</text>
  <text x="575" y="542" class="muted small">for many file ranges</text>
  <text x="575" y="568" class="muted small">via nav multi-read</text>

  <rect x="810" y="510" width="330" height="70" rx="20" class="card-soft"/>
  <text x="838" y="552" class="text metric">0 MCP</text>
  <text x="960" y="542" class="muted small">servers required</text>
  <text x="960" y="568" class="muted small">plain local CLI</text>
</svg>
