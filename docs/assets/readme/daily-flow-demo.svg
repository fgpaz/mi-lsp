<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">mi-lsp thirty second agent workflow demo</title>
  <desc id="desc">A terminal-style demo showing init, ask, pack, and multi-read commands with the context each one returns.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#17213a"/>
    </linearGradient>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #0f172a; stroke: #2f3f58; stroke-width: 1.3; }
      .side { fill: #101827; stroke: #2f3f58; stroke-width: 1.3; }
      .bar { fill: #1f2937; }
      .dot-red { fill: #fb7185; }
      .dot-yellow { fill: #fbbf24; }
      .dot-green { fill: #34d399; }
      .text { fill: #e5eefb; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #dbeafe; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .ok { fill: #7dd3fc; font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .accent { fill: #2dd4bf; }
      .title { font-size: 46px; font-weight: 820; letter-spacing: 0; }
      .body { font-size: 24px; }
      .small { font-size: 21px; }
      .mono-size { font-size: 21px; }
      .metric { font-size: 34px; font-weight: 800; letter-spacing: 0; }
      .pill { fill: #123638; stroke: #1e736c; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620" rx="34"/>
  <text x="60" y="76" class="text title">The daily agent loop becomes copy-pasteable</text>
  <text x="60" y="116" class="muted body">Install once, then ask for maps, reading packs, file slices, and symbol context from the terminal.</text>

  <rect x="60" y="154" width="720" height="392" rx="22" class="panel"/>
  <rect x="60" y="154" width="720" height="52" rx="22" class="bar"/>
  <circle cx="92" cy="180" r="8" class="dot-red"/>
  <circle cx="118" cy="180" r="8" class="dot-yellow"/>
  <circle cx="144" cy="180" r="8" class="dot-green"/>
  <text x="176" y="187" class="muted small">30-second mi-lsp demo</text>

  <text x="88" y="246" class="mono mono-size">$ mi-lsp init . --name myapp</text>
  <text x="88" y="282" class="ok mono-size">=> workspace registered, docs and code indexed</text>
  <text x="88" y="330" class="mono mono-size">$ mi-lsp nav ask "how is this repo organized?" \</text>
  <text x="112" y="362" class="mono mono-size">  --workspace myapp --format toon</text>
  <text x="88" y="398" class="ok mono-size">=> docs-first map instead of broad file reading</text>
  <text x="88" y="446" class="mono mono-size">$ mi-lsp nav pack "understand auth retries" \</text>
  <text x="112" y="478" class="mono mono-size">  --workspace myapp --format toon</text>
  <text x="88" y="514" class="ok mono-size">=> canonical docs, exact slices, next commands</text>

  <rect x="820" y="154" width="320" height="392" rx="22" class="side"/>
  <rect x="850" y="188" width="214" height="42" rx="21" class="pill"/>
  <text x="872" y="216" class="text small" font-weight="700">What the agent saves</text>

  <circle cx="864" cy="278" r="6" class="accent"/>
  <text x="886" y="286" class="text body">Broad grep loops</text>
  <text x="886" y="316" class="muted small">Repo map first</text>

  <circle cx="864" cy="364" r="6" class="accent"/>
  <text x="886" y="372" class="text body">Whole-file dumps</text>
  <text x="886" y="402" class="muted small">Only useful ranges</text>

  <circle cx="864" cy="450" r="6" class="accent"/>
  <text x="886" y="458" class="text body">JSON overhead</text>
  <text x="886" y="488" class="muted small">TOON for token budgets</text>

  <text x="60" y="586" class="muted small">The percentages depend on query shape; TOON is documented at about 20-40% fewer tokens than JSON on large arrays.</text>
</svg>
